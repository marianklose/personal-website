<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="560" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="600" fill="#0f172a">The graph built by build_graph()</text>
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="#64748b">Nodes (functions) wired together by edges (control flow)</text>

  <!-- ============= Graph topology ============= -->

  <!-- Node callout label (above) -->
  <text x="330" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a" letter-spacing="0.5">NODE</text>
  <line x1="330" y1="135" x2="330" y2="162" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- START -->
  <g transform="translate(70, 175)">
    <rect width="100" height="50" rx="25" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
    <text x="50" y="31" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">START</text>
  </g>

  <!-- Edge 1: START -> extractor -->
  <line x1="170" y1="200" x2="246" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Extractor node -->
  <g transform="translate(250, 165)">
    <rect width="160" height="70" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.8"/>
    <text x="80" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">extractor</text>
    <text x="80" y="53" text-anchor="middle" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#166534">extract_parameters</text>
  </g>

  <!-- Edge 2: extractor -> reporter -->
  <line x1="410" y1="200" x2="486" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reporter node -->
  <g transform="translate(490, 165)">
    <rect width="160" height="70" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.8"/>
    <text x="80" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">reporter</text>
    <text x="80" y="53" text-anchor="middle" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#166534">write_report</text>
  </g>

  <!-- Edge 3: reporter -> END -->
  <line x1="650" y1="200" x2="726" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- END -->
  <g transform="translate(730, 175)">
    <rect width="100" height="50" rx="25" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
    <text x="50" y="31" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">END</text>
  </g>

  <!-- Edge callout label (below) -->
  <line x1="448" y1="201" x2="448" y2="245" stroke="#475569" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="448" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#475569" letter-spacing="0.5">EDGE</text>

  <!-- ============= Construction recipe ============= -->

  <text x="80" y="320" font-size="13" font-weight="600" fill="#64748b" letter-spacing="1">HOW build_graph() CONSTRUCTS IT</text>
  <line x1="80" y1="330" x2="820" y2="330" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Step 1: add_node -->
  <g transform="translate(80, 350)">
    <circle cx="14" cy="14" r="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.8"/>
    <text x="14" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">1</text>
    <text x="40" y="13" font-size="13" font-weight="600" fill="#0f172a">Register the nodes</text>
    <text x="40" y="31" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#1e3a8a">workflow.add_node("extractor", extract_parameters)</text>
    <text x="40" y="48" font-size="11" fill="#64748b">A node = a Python function; the string is its name in traces and edges.</text>
  </g>

  <!-- Step 2: add_edge -->
  <g transform="translate(80, 420)">
    <circle cx="14" cy="14" r="14" fill="#f1f5f9" stroke="#475569" stroke-width="1.8"/>
    <text x="14" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">2</text>
    <text x="40" y="13" font-size="13" font-weight="600" fill="#0f172a">Wire the edges</text>
    <text x="40" y="31" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#1e3a8a">workflow.add_edge(START, "extractor")  →  ("extractor", "reporter")  →  ("reporter", END)</text>
    <text x="40" y="48" font-size="11" fill="#64748b">An edge = a control-flow connection from one node name to another.</text>
  </g>

  <!-- Step 3: compile -->
  <g transform="translate(80, 490)">
    <circle cx="14" cy="14" r="14" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/>
    <text x="14" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">3</text>
    <text x="40" y="13" font-size="13" font-weight="600" fill="#0f172a">Compile with a checkpointer</text>
    <text x="40" y="31" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#1e3a8a">workflow.compile(checkpointer=InMemorySaver())  →  CompiledStateGraph</text>
    <text x="40" y="48" font-size="11" fill="#64748b">Freezes the topology and returns a runnable graph with .invoke(), .stream(), .get_state().</text>
  </g>
</svg>
